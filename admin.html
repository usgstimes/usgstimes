<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USGS Times — Admin</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f6fa;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;width:300px;}
input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;box-sizing:border-box;font-size:15px;}
button{width:100%;padding:14px;background:linear-gradient(135deg,#4b5d9a,#6c7ae0);color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<div class="box">
  <h2>🔐 Admin Login</h2>
  <p style="color:#888;">USGS Times Staff Only</p>
  <input id="pass" type="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
  <p id="msg" style="color:red;margin-top:10px;"></p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD608uNQLlhvXdoqzIcQQ01D6tMjNI0I6s",
  authDomain: "usgs-times.firebaseapp.com",
  projectId: "usgs-times",
  storageBucket: "usgs-times.firebasestorage.app",
  messagingSenderId: "34714674408",
  appId: "1:34714674408:web:2ebd7c55a9475e618bd55d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

async function login(){
  const password = document.getElementById("pass").value;
  try{
    await auth.signInWithEmailAndPassword("admin@usgstimes.com", password);
    // Redirect to main site as admin
    window.location.href = "index.html?admin=true";
  }catch(e){
    document.getElementById("msg").innerText = "Wrong password!";
  }
}
</script>
</body>
</html>
